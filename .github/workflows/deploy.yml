name: Deploy CIPP API

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cipp-api
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Function App
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make deploy scripts executable
        run: chmod +x deploy-scripts/*.sh

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Function App name
        id: target
        run: ./deploy-scripts/resolve-function-app.sh rg-cipp-prod

      - name: Create deployment archive
        run: ./deploy-scripts/create-deploy-archive.sh "$RUNNER_TEMP/cipp-api.zip"

      - name: Deploy to Function App
        run: ./deploy-scripts/deploy-function-app.sh rg-cipp-prod "${{ steps.target.outputs.function_app_name }}" "$RUNNER_TEMP/cipp-api.zip"
