
name: 'CI: Scan - Code & Security'

permissions:
  contents: read
  packages: read

on:
  workflow_dispatch:
  push:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  # ============================================
  # MANDATORY: GitGuardian secret scanning
  # ============================================
  gitguardian:
    uses: kyos-iac/library-cicd-iac/.github/workflows/gitguardian-only-check.yml@main
    with:
      runs-on: '["ubuntu-latest"]'
      caller_repo: ${{ github.repository }}
      caller_sha: ${{ github.event.pull_request.head.sha || github.sha }}
    permissions:
      contents: read
      packages: read
    secrets:
      caller_token: ${{ secrets.GITHUB_TOKEN }}
      GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  create-secret-issue:
    needs: [gitguardian]
    if: ${{ always() && needs.gitguardian.outputs.secrets_found == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create issue for detected secrets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CALLER_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          title="Security: GitGuardian detected secret(s) in ${CALLER_SHA}"
          body="## Secret(s) detected by GitGuardian

          The reusable GitGuardian scan detected one or more potential secrets.

          - Repository: ${{ github.repository }}
          - Commit: ${CALLER_SHA}
          - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Action required: rotate/revoke exposed credentials and remove secrets from git history if needed."

          gh issue create --title "$title" --body "$body" --label "security" || \
          gh issue create --title "$title" --body "$body"




  # ============================================
  # .NET: Format check
  # ============================================
  check-dotnet:
    uses: kyos-iac/library-cicd-iac/.github/workflows/dotnet-only-check.yml@main
    with:
      runs-on: '["ubuntu-latest"]'
      caller_repo: ${{ github.repository }}
      caller_sha: ${{ github.event.pull_request.head.sha || github.sha }}
    permissions:
      contents: read
      packages: read
    secrets:
      caller_token: ${{ secrets.GITHUB_TOKEN }}



  # ============================================
  # PowerShell: PSScriptAnalyzer
  # ============================================
  check-powershell:
    uses: kyos-iac/library-cicd-iac/.github/workflows/pwsh-only-check.yml@main
    with:
      runs-on: '["ubuntu-latest"]'
      caller_repo: ${{ github.repository }}
      caller_sha: ${{ github.event.pull_request.head.sha || github.sha }}
    permissions:
      contents: read
      packages: read
    secrets:
      caller_token: ${{ secrets.GITHUB_TOKEN }}





  # ============================================
  # Docker: Hadolint
  # ============================================
  check-docker:
    uses: kyos-iac/library-cicd-iac/.github/workflows/dockerfile-only-check.yml@main
    with:
      runs-on: '["ubuntu-latest"]'
      caller_repo: ${{ github.repository }}
      caller_sha: ${{ github.event.pull_request.head.sha || github.sha }}
    permissions:
      contents: read
      packages: read
    secrets:
      caller_token: ${{ secrets.GITHUB_TOKEN }}








