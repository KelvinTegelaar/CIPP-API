name: Sync upstream CIPP-API

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  ENABLE_EMAIL_NOTIFICATION: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Check for upstream changes
        id: check
        run: |
          git remote add upstream https://github.com/KelvinTegelaar/CIPP-API.git
          git fetch upstream
          NEW_COMMITS=$(git rev-list HEAD..upstream/master --count)
          echo "new_commits=$NEW_COMMITS" >> $GITHUB_OUTPUT

      - name: Create sync branch
        if: steps.check.outputs.new_commits != '0'
        run: |
          BRANCH="upstream-sync/pending"
          git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"
          git merge upstream/master --no-ff -m "chore: sync upstream CIPP-API $(date +%Y-%m-%d)"
          git push origin "$BRANCH" --force

      - name: Send email notification
        if: steps.check.outputs.new_commits != '0' && env.ENABLE_EMAIL_NOTIFICATION == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: 587
          secure: false
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          to: dereki@venture.ca,jonathan.smith@venture.ca
          from: ${{ secrets.SMTP_USERNAME }}
          subject: "CIPP-API update available — upstream-sync/pending"
          body: |
            A new upstream update is available for your CIPP-API fork.

            Branch: upstream-sync/pending
            New commits: ${{ steps.check.outputs.new_commits }}

            Review the changes and merge when ready:
            https://github.com/${{ github.repository }}/compare/main...upstream-sync/pending
